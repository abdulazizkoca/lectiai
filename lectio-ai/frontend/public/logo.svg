<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8941a;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle inner highlight -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="60%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#F5A623" flood-opacity="0.45"/>
    </filter>

    <!-- Clip path for rounded rect -->
    <clipPath id="roundClip">
      <rect x="4" y="4" width="92" height="92" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Shadow layer -->
  <rect x="4" y="4" width="92" height="92" rx="22" ry="22"
        fill="url(#mainGrad)" filter="url(#shadow)"/>

  <!-- Main background -->
  <rect x="4" y="4" width="92" height="92" rx="22" ry="22"
        fill="url(#mainGrad)"/>

  <!-- Glossy shine overlay -->
  <rect x="4" y="4" width="92" height="92" rx="22" ry="22"
        fill="url(#shineGrad)" clip-path="url(#roundClip)"/>

  <!-- Letter L -->
  <text
    x="50" y="72"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="58"
    font-weight="bold"
    text-anchor="middle"
    fill="#1a0a00"
    opacity="0.85"
  >L</text>
</svg>
