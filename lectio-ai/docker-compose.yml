version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://user:pass@postgres:5432/lectioai
    depends_on:
      - redis
      - postgres
    deploy:
      resources:
        limits:
          memory: 1G  # Render.com yoki oddiy VPS dagi RAM cheklovlariga amal qilish
        reservations:
          memory: 512M
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: lectioai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

volumes:
  pgdata:
